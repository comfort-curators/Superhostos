# DigitalOcean App Platform spec for SuperhostOS (Comfort Curators).
#
# Deploy:  doctl apps create --spec .do/app.yaml
# Update:  doctl apps update <APP_ID> --spec .do/app.yaml
# Or import this file in the App Platform UI ("Create App" -> "Edit your App Spec").
#
# One app, one domain:
#   /            -> web (static Vite SPA)
#   /v1, /health -> api (Fastify, Dockerfile)
# The web calls the API same-origin, so VITE_API_BASE_URL is left empty.
name: superhostos
region: nyc

services:
  - name: api
    dockerfile_path: apps/api/Dockerfile
    source_dir: /
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 4000
    health_check:
      http_path: /health
    routes:
      - path: /v1
        preserve_path_prefix: true
      - path: /health
        preserve_path_prefix: true
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      # Managed databases below are bound automatically.
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.DATABASE_URL}
      # Secrets — set the real values in the App Platform dashboard (these
      # placeholders are encrypted on first deploy; never commit real keys).
      - key: CLERK_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_IN_DASHBOARD
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_IN_DASHBOARD
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_IN_DASHBOARD

static_sites:
  - name: web
    source_dir: /
    environment_slug: node-js
    build_command: corepack enable && corepack prepare pnpm@9.12.2 --activate && pnpm install --frozen-lockfile && pnpm --filter @superhostos/web build
    output_dir: apps/web/dist
    catchall_document: index.html
    routes:
      - path: /
    envs:
      # Same-origin API (served by this app under /v1) -> leave empty.
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        value: ""
      # Optional: enable Clerk auth by setting the publishable key (build-time).
      - key: VITE_CLERK_PUBLISHABLE_KEY
        scope: BUILD_TIME
        value: ""

databases:
  - name: db
    engine: PG
    version: "16"
    # Dev database for the trial; flip to true (and add size/num_nodes) for prod.
    production: false
  - name: redis
    engine: REDIS
    version: "7"
    production: false
