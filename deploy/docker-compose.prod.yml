version: '3.9'
services:
  api:
    image: ghcr.io/superhostos/api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_URL: ${REDIS_URL}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - "4000"

  web:
    image: ghcr.io/superhostos/web:latest
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  caddy_data:
  caddy_config:
