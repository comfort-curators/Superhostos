version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: superhostos
      POSTGRES_PASSWORD: superhostos
      POSTGRES_DB: superhostos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: development
      PORT: 4000
      REDIS_URL: redis://redis:6379
      CLERK_SECRET_KEY: test_clerk_secret_key
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  postgres_data:
