version: '3.9'
services:
  postgres:
    image: postgres:16
    platform: linux/amd64
    environment:
      POSTGRES_USER: superhostos
      POSTGRES_PASSWORD: superhostos
      POSTGRES_DB: superhostos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superhostos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: